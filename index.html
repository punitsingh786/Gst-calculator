<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>GST Calculator</h1>

        <div class="input-group">
            <label>Amount (₹)</label>
            <input type="number" id="amount" placeholder="Enter Amount">
        </div>

        <div class="input-group">
            <label>GST Rate (%)</label>
            <select id="gstRate">
                <option value="5">5%</option>
                <option value="12">12%</option>
                <option value="18">18%</option>
                <option value="28">28%</option>
            </select>
        </div>

        <button onclick="calculateGST()">Calculate GST</button>

        <div class="result">
            <h3>Results</h3>

            <p>Original Amount: ₹<span id="original">0</span></p>

            <p>GST Amount: ₹<span id="gstAmount">0</span></p>

            <p>Total Amount: ₹<span id="totalAmount">0</span></p>
        </div>

        <div class="developer-info">
            <h4>Punit Kumar Singh</h4>
            <p>punitkumarsingh987@gmail.com</p>
        </div>

        <a href="https://digitalheroesco.com" target="_blank">
            <button class="dh-btn">
                Built for Digital Heroes
            </button>
        </a>
    </div>

    <script src="script.js"></script>

</body>
</html>
